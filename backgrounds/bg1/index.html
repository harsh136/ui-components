<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead-Type Turbulence | Flash UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --ink: #e0e0e0;
            --accent: #ff3c00;
            --lead-gray: #1a1a1a;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            overflow: hidden;
            height: 100vh;
        }

        /* Material Texture Overlay */
        .grain-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            opacity: 0.08;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Lead Type ASCII Canvas */
        #ascii-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: contrast(1.2) brightness(0.9);
            mix-blend-mode: lighten;
        }

        /* Hero Layout */
        .hero-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4rem;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo {
            font-family: var(--mono);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border-left: 2px solid var(--accent);
            padding-left: 1rem;
        }

        .meta-data {
            font-family: var(--mono);
            font-size: 0.7rem;
            line-height: 1.6;
            text-align: right;
            color: #666;
        }

        .main-content {
            max-width: 900px;
        }

        h1 {
            font-size: clamp(4rem, 12vw, 10rem);
            line-height: 0.85;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            font-weight: 900;
            mix-blend-mode: difference;
        }

        .description {
            font-family: var(--mono);
            font-size: 1.1rem;
            max-width: 450px;
            color: #888;
            margin-bottom: 3rem;
            position: relative;
        }

        .description::before {
            content: "";
            position: absolute;
            left: -1rem;
            top: 0.5rem;
            width: 2px;
            height: 10px;
            background: var(--accent);
        }

        .cta-group {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .btn-primary {
            padding: 1.25rem 2.5rem;
            background: transparent;
            border: 1px solid var(--ink);
            color: var(--ink);
            font-family: var(--mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            background: var(--ink);
            color: var(--bg);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Custom Cursor */
        #custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid var(--ink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: width 0.3s, height 0.3s;
        }

        .cursor-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Footer Info */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-family: var(--mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            background: rgba(255,255,255,0.05);
            border-radius: 100px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .hero-container { padding: 2rem; }
            .meta-data { display: none; }
            h1 { font-size: 4rem; }
            .cta-group { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }
    </style>
</head>
<body>

    <div class="grain-overlay"></div>
    <div id="custom-cursor">
        <div class="cursor-dot"></div>
    </div>
    <canvas id="ascii-canvas"></canvas>

    <div class="hero-container">
        <nav>
            <div class="logo">
                SYSTEM.TYPE<br>LEAD_TURBULENCE
            </div>
            <div class="meta-data">
                LATENCY: 12ms<br>
                REFRESH: 60HZ<br>
                GRAIN: 0.85
            </div>
        </nav>

        <main class="main-content">
            <h1>PRESS<br>MATTER</h1>
            <p class="description">
                Tactile lead-type generation engine. High-fidelity ASCII turbulence driven by mechanical friction and digital noise.
            </p>
            <div class="cta-group">
                <button class="btn-primary">Initialize Sequence</button>
                <div class="status-pill">
                    <span class="status-dot"></span>
                    Engine Active
                </div>
            </div>
        </main>

        <footer>
            <div>©2024 FLASH_UI LABORATORY</div>
            <div>COORDINATES: 34.0522° N, 118.2437° W</div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('ascii-canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('custom-cursor');

        let width, height, rows, cols;
        const fontSize = 14;
        const charSet = " .:-=+*#%@".split("");
        // Alternate Lead Type Set: ["·", "┌", "┘", "┼", "─", "│", "■", "□"]
        const techChars = ["·", "░", "▒", "▓", "█", "■", "□", "0", "1", "/", "\\", "┼"];

        let mouse = { x: -1000, y: -1000, targetX: 0, targetY: 0 };
        let time = 0;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.ceil(width / fontSize);
            rows = Math.ceil(height / fontSize);
            ctx.font = `${fontSize}px 'JetBrains Mono'`;
            ctx.textBaseline = 'top';
        }

        window.addEventListener('resize', init);
        window.addEventListener('mousemove', (e) => {
            mouse.targetX = e.clientX;
            mouse.targetY = e.clientY;
            
            // Cursor movement
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        function draw() {
            time += 0.01;
            
            // Smooth mouse
            mouse.x += (mouse.targetX - mouse.x) * 0.1;
            mouse.y += (mouse.targetY - mouse.y) * 0.1;

            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const posX = x * fontSize;
                    const posY = y * fontSize;

                    // Calculate turbulence
                    const dist = Math.sqrt(Math.pow(posX - mouse.x, 2) + Math.pow(posY - mouse.y, 2));
                    const angle = Math.atan2(posY - mouse.y, posX - mouse.x);
                    
                    // Wave pattern
                    const wave = Math.sin(x * 0.1 + time) * Math.cos(y * 0.1 + time);
                    
                    // Proximity influence
                    const hoverImpact = Math.max(0, 1 - dist / 500);
                    const ripple = Math.sin(dist * 0.02 - time * 5) * hoverImpact;
                    
                    // Noise index
                    let n = (wave * 0.5 + 0.5) * techChars.length;
                    n += ripple * 5;
                    n = Math.abs(Math.floor(n)) % techChars.length;

                    // Color/Lead shading
                    const alpha = 0.1 + (hoverImpact * 0.6) + (Math.sin(time + x) * 0.05);
                    ctx.fillStyle = `rgba(224, 224, 224, ${alpha})`;

                    // Add slight displacement based on mouse
                    const offsetX = Math.cos(angle) * hoverImpact * 5;
                    const offsetY = Math.sin(angle) * hoverImpact * 5;

                    ctx.fillText(techChars[n], posX + offsetX, posY + offsetY);
                }
            }

            requestAnimationFrame(draw);
        }

        // Micro-interaction: Expand cursor on button hover
        const btns = document.querySelectorAll('button');
        btns.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                cursor.style.width = '80px';
                cursor.style.height = '80px';
                cursor.style.backgroundColor = 'rgba(255, 60, 0, 0.1)';
            });
            btn.addEventListener('mouseleave', () => {
                cursor.style.width = '40px';
                cursor.style.height = '40px';
                cursor.style.backgroundColor = 'transparent';
            });
        });

        init();
        draw();
    </script>
</body>
</html>
