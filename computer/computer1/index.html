<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Industrial Monocoque Monitor</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=JetBrains+Mono:wght@500&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --metal-shine: linear-gradient(
                    135deg,
                    #f0f0f0 0%,
                    #a1a1aa 45%,
                    #71717a 50%,
                    #a1a1aa 55%,
                    #f0f0f0 100%
                );
                --brushed: repeating-linear-gradient(
                    90deg,
                    rgba(0, 0, 0, 0.03) 0px,
                    rgba(0, 0, 0, 0.03) 1px,
                    transparent 1px,
                    transparent 2px
                );
                --amber-glow:
                    0 0 15px rgba(251, 191, 36, 0.4),
                    0 0 30px rgba(251, 191, 36, 0.2);
            }

            body {
                background-color: #0c0c0e;
                font-family: "Inter", sans-serif;
            }

            .monocoque-shell {
                background: var(--metal-shine);
                position: relative;
                box-shadow:
                    0 30px 60px -12px rgba(0, 0, 0, 0.7),
                    inset 0 2px 2px rgba(255, 255, 255, 0.8),
                    inset 0 -4px 8px rgba(0, 0, 0, 0.3);
                transition: transform 0.4s
                    cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .monocoque-shell::before {
                content: "";
                position: absolute;
                inset: 0;
                background: var(--brushed);
                pointer-events: none;
                border-radius: inherit;
            }

            .recessed-display {
                background: #050505;
                box-shadow:
                    inset 0 10px 20px rgba(0, 0, 0, 0.9),
                    inset 0 2px 4px rgba(0, 0, 0, 0.8),
                    0 1px 1px rgba(255, 255, 255, 0.2);
                overflow: hidden;
            }

            .scanlines {
                background: linear-gradient(
                    to bottom,
                    rgba(18, 16, 16, 0) 50%,
                    rgba(0, 0, 0, 0.2) 50%
                );
                background-size: 100% 4px;
                pointer-events: none;
            }

            .hex-bolt {
                width: 8px;
                height: 8px;
                background: #52525b;
                clip-path: polygon(
                    25% 0%,
                    75% 0%,
                    100% 50%,
                    75% 100%,
                    25% 100%,
                    0% 50%
                );
                box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.5);
            }

            .eye-unit {
                transition: all 0.2s cubic-bezier(0.33, 1, 0.68, 1);
                filter: var(--amber-glow);
            }

            @keyframes glitch {
                0% {
                    transform: translate(0);
                    filter: hue-rotate(0deg);
                }
                20% {
                    transform: translate(-2px, 2px);
                }
                40% {
                    transform: translate(-2px, -2px);
                    filter: hue-rotate(90deg);
                }
                60% {
                    transform: translate(2px, 2px);
                }
                80% {
                    transform: translate(2px, -2px);
                }
                100% {
                    transform: translate(0);
                    filter: hue-rotate(0deg);
                }
            }

            .glitching {
                animation: glitch 0.2s intensity infinite;
            }

            @keyframes breathe {
                0%,
                100% {
                    opacity: 0.4;
                    transform: scaleY(1);
                }
                50% {
                    opacity: 0.1;
                    transform: scaleY(0.8);
                }
            }

            .status-led {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #fbbf24;
                box-shadow: 0 0 8px #fbbf24;
            }

            .sleeping .status-led {
                animation: breathe 3s ease-in-out infinite;
            }

            .milled-vent {
                height: 2px;
                background: rgba(0, 0, 0, 0.3);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
        </style>
    </head>
    <body
        class="flex items-center justify-center min-h-screen p-8 overflow-hidden"
    >
        <div class="relative group">
            <!-- Technical Label -->
            <div
                class="absolute -top-12 left-0 font-mono text-[10px] text-zinc-500 uppercase tracking-[0.2em] flex items-center gap-4"
            >
                <span>Core Diagnostics // MK-84</span>
                <div class="h-[1px] w-24 bg-zinc-800"></div>
                <span id="coord-display">X:00 Y:00</span>
            </div>

            <!-- Main Monocoque Chassis -->
            <div
                id="chassis"
                class="monocoque-shell w-[420px] h-[340px] rounded-[2.5rem] p-6 cursor-pointer active:scale-[0.98] transition-all"
            >
                <!-- Bolts -->
                <div class="absolute top-6 left-6 hex-bolt"></div>
                <div class="absolute top-6 right-6 hex-bolt"></div>
                <div class="absolute bottom-6 left-6 hex-bolt"></div>
                <div class="absolute bottom-6 right-6 hex-bolt"></div>

                <!-- Recessed Screen Area -->
                <div
                    id="screen"
                    class="recessed-display w-full h-full rounded-[1.5rem] relative flex items-center justify-center border-t-2 border-zinc-900"
                >
                    <div
                        class="scanlines absolute inset-0 z-10 opacity-30"
                    ></div>

                    <!-- Eye Units -->
                    <div id="eye-container" class="flex gap-16 relative z-20">
                        <div
                            id="eye-l"
                            class="eye-unit w-3 h-24 bg-amber-400 rounded-full"
                        ></div>
                        <div
                            id="eye-r"
                            class="eye-unit w-3 h-24 bg-amber-400 rounded-full"
                        ></div>
                    </div>

                    <!-- CRT Overlay -->
                    <div
                        class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/5 to-transparent pointer-events-none"
                    ></div>

                    <!-- Terminal Text -->
                    <div
                        id="status-text"
                        class="absolute bottom-6 left-1/2 -translate-x-1/2 font-mono text-[9px] text-amber-500/50 tracking-widest uppercase"
                    >
                        System.Status: Nominal
                    </div>
                </div>

                <!-- Milled Vents -->
                <div class="absolute -right-3 top-1/4 flex flex-col gap-1">
                    <div class="milled-vent w-6"></div>
                    <div class="milled-vent w-6"></div>
                    <div class="milled-vent w-6"></div>
                    <div class="milled-vent w-6"></div>
                </div>
            </div>

            <!-- Heavy Base -->
            <div class="mt-8 flex flex-col items-center">
                <div
                    class="w-32 h-12 bg-gradient-to-b from-zinc-400 to-zinc-600 rounded-t-xl shadow-2xl relative overflow-hidden"
                >
                    <div class="absolute inset-0 bg-[var(--brushed)]"></div>
                    <div class="w-full h-1 bg-white/20"></div>
                </div>
                <div
                    class="w-56 h-4 bg-zinc-800 rounded-full shadow-2xl blur-sm opacity-50"
                ></div>
            </div>

            <!-- Secondary UI Elements -->
            <div
                class="absolute -right-24 top-1/2 -translate-y-1/2 flex flex-col gap-8"
            >
                <div class="flex flex-col gap-1">
                    <div class="status-led mb-2"></div>
                    <div class="font-mono text-[8px] text-zinc-600 uppercase">
                        Power<br />Stable
                    </div>
                </div>
                <div
                    class="h-32 w-[1px] bg-gradient-to-b from-transparent via-zinc-800 to-transparent"
                ></div>
                <div class="flex flex-col gap-1">
                    <div class="font-mono text-[8px] text-zinc-600 uppercase">
                        Thermal
                    </div>
                    <div
                        class="w-12 h-1 bg-zinc-900 rounded-full overflow-hidden"
                    >
                        <div class="w-2/3 h-full bg-amber-500/40"></div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const chassis = document.getElementById("chassis");
            const eyeL = document.getElementById("eye-l");
            const eyeR = document.getElementById("eye-r");
            const screen = document.getElementById("screen");
            const statusText = document.getElementById("status-text");
            const coordDisplay = document.getElementById("coord-display");

            let isSleeping = false;
            let idleTimer;
            let isBlinking = false;

            // Audio System
            const audioCtx = new (
                window.AudioContext || window.webkitAudioContext
            )();
            function playIndustrialSound(f1, f2, dur, type = "square") {
                if (audioCtx.state === "suspended") audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(
                    f2,
                    audioCtx.currentTime + dur,
                );
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(
                    0,
                    audioCtx.currentTime + dur,
                );
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + dur);
            }

            function updateEyes(x = 0, y = 0, scaleY = 1, opacity = 1) {
                const transform = `translate(${x}px, ${y}px) scaleY(${scaleY})`;
                eyeL.style.transform = transform;
                eyeR.style.transform = transform;
                eyeL.style.opacity = opacity;
                eyeR.style.opacity = opacity;
            }

            function blink() {
                if (isSleeping || isBlinking) return;
                isBlinking = true;
                updateEyes(0, 0, 0.1);
                setTimeout(() => {
                    isBlinking = false;
                    if (!isSleeping) updateEyes();
                }, 120);

                setTimeout(blink, 3000 + Math.random() * 4000);
            }

            function wakeUp() {
                isSleeping = false;
                chassis.classList.remove("sleeping");
                statusText.innerText = "System.Status: Nominal";
                statusText.style.color = "#fbbf24";
                playIndustrialSound(200, 800, 0.1);
                setTimeout(() => playIndustrialSound(400, 1200, 0.1), 50);
                updateEyes();
                resetIdle();
            }

            function sleep() {
                isSleeping = true;
                chassis.classList.add("sleeping");
                statusText.innerText = "Power.Mode: Standby";
                statusText.style.color = "#52525b";
                playIndustrialSound(600, 100, 0.5, "sine");
                updateEyes(0, 10, 0.05, 0.3);
            }

            function resetIdle() {
                clearTimeout(idleTimer);
                if (!isSleeping) idleTimer = setTimeout(sleep, 8000);
            }

            window.addEventListener("mousemove", (e) => {
                if (isSleeping) return;

                const rect = chassis.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                const moveX = (e.clientX - centerX) / 25;
                const moveY = (e.clientY - centerY) / 25;

                // Update text coords
                coordDisplay.innerText = `X:${Math.round(moveX).toString().padStart(2, "0")} Y:${Math.round(moveY).toString().padStart(2, "0")}`;

                updateEyes(moveX, moveY);
                resetIdle();
            });

            chassis.addEventListener("click", () => {
                if (isSleeping) {
                    wakeUp();
                } else {
                    playIndustrialSound(150, 50, 0.3, "sawtooth");
                    screen.classList.add("glitching");
                    updateEyes(0, 0, 0.2);
                    statusText.innerText = "Error: Kinetic impact detected";

                    setTimeout(() => {
                        screen.classList.remove("glitching");
                        updateEyes();
                        statusText.innerText = "System.Status: Nominal";
                    }, 500);
                }

                // Physical shake
                chassis.style.transform = "scale(0.98) translateY(5px)";
                setTimeout(() => (chassis.style.transform = ""), 100);
            });

            // Init
            setTimeout(blink, 2000);
            resetIdle();
        </script>
    </body>
</html>
