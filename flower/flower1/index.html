<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petal Prism Suspension</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #a855f7;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.12);
            --text-main: #f8fafc;
            --text-dim: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Prismatic Resin Container */
        .resin-card {
            position: relative;
            width: 420px;
            height: 580px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 40px;
            backdrop-filter: blur(40px);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 0 80px rgba(168, 85, 247, 0.05),
                inset 0 0 2px 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), border-color 0.4s ease;
        }

        .resin-card:hover {
            border-color: rgba(168, 85, 247, 0.4);
            transform: translateY(-10px) rotateX(2deg);
        }

        /* 3D Scene Layer */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* UI Overlays */
        .content {
            position: relative;
            z-index: 2;
            padding: 48px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .tag {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            background: rgba(168, 85, 247, 0.1);
            padding: 6px 12px;
            border-radius: 100px;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .meta-id {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
        }

        .footer {
            transform: translateZ(20px);
        }

        h1 {
            font-size: 42px;
            line-height: 0.9;
            margin-bottom: 12px;
            color: var(--text-main);
            letter-spacing: -0.04em;
        }

        p {
            font-size: 14px;
            color: var(--text-dim);
            max-width: 240px;
            line-height: 1.6;
        }

        /* Prismatic Noise Filter */
        .noise {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            z-index: 3;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .caustics {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% -20%, rgba(168, 85, 247, 0.15) 0%, transparent 60%);
            z-index: 0;
            mix-blend-mode: screen;
        }

        /* Action Button */
        .action-area {
            margin-top: 24px;
            pointer-events: auto;
        }

        .btn-interact {
            background: white;
            color: black;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-interact:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>

    <div class="resin-card">
        <div class="noise"></div>
        <div class="caustics"></div>
        
        <div id="canvas-container"></div>

        <div class="content">
            <div class="header">
                <span class="tag">System.Active</span>
                <span class="meta-id">X-PETAL // 001</span>
            </div>

            <div class="footer">
                <h1>PRISM<br>REACTION</h1>
                <p>Biomorphic suspension interface with real-time prismatic refraction and neural-link tracking.</p>
                <div class="action-area">
                    <button class="btn-interact">INITIALIZE CORE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, group;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 0.1, 1000);
            camera.position.z = 8;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            container.appendChild(renderer.domElement);

            group = new THREE.Group();
            group.scale.set(0.85, 0.85, 0.85);
            group.rotation.x = 0.5;
            scene.add(group);

            // Materials
            const tarsPurpleMaterial = new THREE.MeshPhysicalMaterial({
                color: 0x8b5cf6,
                metalness: 0.1,
                roughness: 0.2,
                emissive: 0x4c1d95,
                emissiveIntensity: 0.5,
            });

            const tarsDeepGlassMaterial = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                metalness: 0,
                roughness: 0.05,
                transmission: 0.95,
                thickness: 2.0,
                ior: 1.5,
                clearcoat: 1.0,
                transparent: true,
                opacity: 0.4
            });

            // Core
            const coreGeom = new THREE.SphereGeometry(0.7, 32, 32);
            const core = new THREE.Mesh(coreGeom, tarsPurpleMaterial);
            group.add(core);

            // Petals
            const petals = [0, 60, 120, 180, 240, 300];
            const petalGeom = new THREE.SphereGeometry(0.7, 32, 32);
            const innerGeom = new THREE.SphereGeometry(0.5, 16, 16);

            petals.forEach(angle => {
                const petalGroup = new THREE.Group();
                petalGroup.rotation.z = (angle * Math.PI) / 180;

                // Outer Glass Petal
                const petal = new THREE.Mesh(petalGeom, tarsDeepGlassMaterial);
                petal.position.y = 1.4;
                petal.scale.set(1, 1.8, 0.2);
                petalGroup.add(petal);

                // Inner Detail
                const inner = new THREE.Mesh(innerGeom, tarsPurpleMaterial);
                inner.position.set(0, 1.2, 0.1);
                inner.scale.set(0.2, 1.2, 0.1);
                petalGroup.add(inner);

                group.add(petalGroup);
            });

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xa855f7, 2);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            const topLight = new THREE.DirectionalLight(0xffffff, 1);
            topLight.position.set(0, 10, 0);
            scene.add(topLight);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            const t = performance.now() * 0.001;

            // Idle Animation (Z rotation)
            group.rotation.z += 0.005;

            // Mouse Follow Logic (Lerp)
            targetX = (mouseY * 0.5) + 0.5;
            targetY = mouseX * 0.5;

            group.rotation.x = THREE.MathUtils.lerp(group.rotation.x, targetX, 0.05);
            group.rotation.y = THREE.MathUtils.lerp(group.rotation.y, targetY, 0.05);

            // Floating movement
            group.position.y = Math.sin(t) * 0.15;

            renderer.render(scene, camera);
        }

        window.addEventListener('mousemove', (e) => {
            // Normalized -1 to 1
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = (e.clientY / window.innerHeight) * 2 - 1;
        });

        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.offsetWidth / container.offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.offsetWidth, container.offsetHeight);
        });

        init();

        // Entry Reveal
        gsap.from(".resin-card", {
            duration: 1.5,
            y: 100,
            opacity: 0,
            ease: "expo.out",
            delay: 0.2
        });
        
        gsap.from("h1, p, .tag, .action-area", {
            duration: 1,
            y: 20,
            opacity: 0,
            stagger: 0.1,
            ease: "power3.out",
            delay: 0.6
        });
    </script>
</body>
</html>
