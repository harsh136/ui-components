<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitreous Bloom - Flash UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #030305;
            --accent: #9d4edd;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #88888e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Noise Texture Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 10;
        }

        .container {
            position: relative;
            width: 1000px;
            height: 600px;
            display: flex;
            background: linear-gradient(135deg, rgba(15, 15, 20, 0.6) 0%, rgba(5, 5, 8, 0.8) 100%);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        .info-panel {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 2;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            opacity: 0.8;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .description {
            color: var(--text-dim);
            font-size: 16px;
            line-height: 1.6;
            max-width: 320px;
            margin-top: 24px;
        }

        .stats {
            display: flex;
            gap: 40px;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-val {
            font-size: 18px;
            color: var(--text-main);
        }

        .stat-lab {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .visual-canvas {
            position: absolute;
            top: 0;
            right: 0;
            width: 65%;
            height: 100%;
            z-index: 1;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(157, 78, 221, 0.02) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 3;
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.15) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="scanline"></div>
        <div class="glow"></div>
        
        <div class="info-panel">
            <div class="header animate-in" style="animation-delay: 0.1s;">
                <span class="label">Project: TARS-71</span>
                <h1>VITREOUS<br>BLOOM</h1>
                <p class="description">A procedural refractive sculpture exploring the intersection of organic growth and digital materiality. Interaction-driven morphology.</p>
            </div>

            <div class="stats animate-in" style="animation-delay: 0.3s;">
                <div class="stat-item">
                    <span class="stat-lab">Refractive Index</span>
                    <span class="stat-val">1.45 IOR</span>
                </div>
                <div class="stat-item">
                    <span class="stat-lab">Transmission</span>
                    <span class="stat-val">0.98</span>
                </div>
                <div class="stat-item">
                    <span class="stat-lab">Petal Count</span>
                    <span class="stat-val">06</span>
                </div>
            </div>
        </div>

        <div id="canvas-container" class="visual-canvas"></div>
    </div>

    <script>
        let scene, camera, renderer, group;
        let mouseX = 0, mouseY = 0;
        let targetRotX = 0, targetRotY = 0;

        function init() {
            const container = document.getElementById('canvas-container');
            const width = container.offsetWidth;
            const height = container.offsetHeight;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(width, height);
            container.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0x9d4edd, 2);
            spotLight.position.set(5, 5, 5);
            scene.add(spotLight);

            const backLight = new THREE.PointLight(0xffffff, 1);
            backLight.position.set(-5, -5, -2);
            scene.add(backLight);

            // Group Setup
            group = new THREE.Group();
            group.scale.set(0.85, 0.85, 0.85);
            scene.add(group);

            // Materials
            const purpleMaterial = new THREE.MeshPhysicalMaterial({
                color: 0x240046,
                emissive: 0x3c096c,
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.8
            });

            const glassMaterial = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                metalness: 0,
                roughness: 0.05,
                transmission: 1.0,
                thickness: 1.5,
                ior: 1.45,
                clearcoat: 1.0,
                opacity: 0.4,
                transparent: true
            });

            // Core
            const coreGeom = new THREE.SphereGeometry(0.7, 64, 64);
            const core = new THREE.Mesh(coreGeom, purpleMaterial);
            group.add(core);

            // Petals
            const petalAngles = [0, 60, 120, 180, 240, 300];
            const petalGeom = new THREE.SphereGeometry(0.7, 32, 32);
            
            petalAngles.forEach((angle) => {
                const petalPivot = new THREE.Group();
                petalPivot.rotation.z = (angle * Math.PI) / 180;
                
                // Outer Glass Petal
                const petalMesh = new THREE.Mesh(petalGeom, glassMaterial);
                petalMesh.position.set(0, 1.4, 0);
                petalMesh.scale.set(1, 1.8, 0.2);
                petalPivot.add(petalMesh);

                // Inner Detail
                const innerDetail = new THREE.Mesh(
                    new THREE.SphereGeometry(0.5, 16, 16),
                    purpleMaterial
                );
                innerDetail.position.set(0, 1.2, 0.1);
                innerDetail.scale.set(0.2, 1.2, 0.1);
                petalPivot.add(innerDetail);

                group.add(petalPivot);
            });

            window.addEventListener('mousemove', (e) => {
                const rect = container.getBoundingClientRect();
                mouseX = ((e.clientX - rect.left) / width) * 2 - 1;
                mouseY = -((e.clientY - rect.top) / height) * 2 + 1;
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            const t = performance.now() * 0.001;
            
            // Idle rotation
            group.rotation.z += 0.002;
            
            // Mouse Tracking Lerp
            targetRotX = (mouseY * 0.5) + 0.5;
            targetRotY = mouseX * 0.5;

            group.rotation.x = THREE.MathUtils.lerp(group.rotation.x, targetRotX, 0.05);
            group.rotation.y = THREE.MathUtils.lerp(group.rotation.y, targetRotY, 0.05);

            // Subtle Floating
            group.position.y = Math.sin(t * 0.5) * 0.1;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.offsetWidth / container.offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.offsetWidth, container.offsetHeight);
        });

        init();
    </script>
</body>
</html>
