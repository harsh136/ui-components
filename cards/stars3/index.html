<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050506;
            --glass-edge: rgba(255, 255, 255, 0.08);
            --star-color: #ffffff;
            --bleed-color: rgba(140, 160, 255, 0.15);
            --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Container for perspective effect */
        .scene {
            perspective: 1200px;
        }

        /* The Card */
        .card {
            position: relative;
            width: 380px;
            height: 540px;
            background: var(--obsidian);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            border: 1px solid var(--glass-edge);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: transform 0.6s var(--transition-smooth), box-shadow 0.6s var(--transition-smooth);
            transform-style: preserve-3d;
        }

        .card:hover {
            transform: translateY(-10px) rotateX(4deg) rotateY(-2deg);
            box-shadow: 
                0 50px 80px rgba(0, 0, 0, 0.8),
                inset 0 1px 2px rgba(255, 255, 255, 0.2);
        }

        /* Vitreous Light Bleed */
        .light-bleed {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(
                circle at var(--x, 50%) var(--y, 50%), 
                var(--bleed-color) 0%, 
                transparent 50%
            );
            opacity: 0;
            transition: opacity 0.5s var(--transition-smooth);
            pointer-events: none;
            z-index: 1;
        }

        .card:hover .light-bleed {
            opacity: 1;
        }

        /* Starry Sky Layer */
        .sky {
            position: absolute;
            inset: 0;
            z-index: 0;
            opacity: 0.6;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Shooting Star Effect */
        .shooting-star {
            position: absolute;
            top: -50px;
            left: 100%;
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
            transform: rotate(-45deg);
            animation: shoot var(--s-duration) linear infinite;
            animation-delay: var(--s-delay);
            filter: blur(1px);
            z-index: 0;
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-45deg) scaleX(0); opacity: 0; }
            5% { transform: translate(-100px, 100px) rotate(-45deg) scaleX(1); opacity: 1; }
            20% { transform: translate(-800px, 800px) rotate(-45deg) scaleX(1); opacity: 0; }
            100% { transform: translate(-800px, 800px) rotate(-45deg) scaleX(1); opacity: 0; }
        }

        /* Typography & Content */
        .content {
            position: relative;
            z-index: 2;
            pointer-events: none;
        }

        .card-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
            display: block;
        }

        .card-title {
            font-size: 42px;
            font-weight: 800;
            color: #ffffff;
            line-height: 0.9;
            letter-spacing: -0.04em;
            mix-blend-mode: overlay;
        }

        .card-footer {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .data-point {
            font-family: 'JetBrains Mono', monospace;
        }

        .data-value {
            display: block;
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .data-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.1em;
        }

        .btn-obsidian {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-edge);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--transition-smooth);
        }

        .card:hover .btn-obsidian {
            background: #ffffff;
        }

        .btn-obsidian svg {
            width: 18px;
            height: 18px;
            stroke: #ffffff;
            transition: stroke 0.3s var(--transition-smooth);
        }

        .card:hover .btn-obsidian svg {
            stroke: #000000;
        }

        /* Obsidian Sheen */
        .sheen {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                125deg,
                transparent 0%,
                transparent 40%,
                rgba(255, 255, 255, 0.05) 50%,
                transparent 60%,
                transparent 100%
            );
            background-size: 200% 200%;
            background-position: 100% 100%;
            transition: background-position 0.8s var(--transition-smooth);
            z-index: 3;
        }

        .card:hover .sheen {
            background-position: 0% 0%;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="card" id="obsidianCard">
            <!-- Dynamic Light Bleed -->
            <div class="light-bleed" id="bleed"></div>
            
            <!-- Background Elements -->
            <div class="sky" id="starField"></div>
            <div class="shooting-star" style="--s-duration: 6s; --s-delay: 0s;"></div>
            <div class="shooting-star" style="--s-duration: 8s; --s-delay: 3s;"></div>
            
            <!-- Glass Sheen Overlay -->
            <div class="sheen"></div>

            <div class="content">
                <span class="card-label">Cosmos Series</span>
                <h1 class="card-title">CELESTIAL<br>DRIFT</h1>
            </div>

            <div class="card-footer">
                <div class="data-point">
                    <span class="data-value">0.00189</span>
                    <span class="data-label">Parsecs / Sec</span>
                </div>
                
                <div class="btn-obsidian">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="7" y1="17" x2="17" y2="7"></line>
                        <polyline points="7 7 17 7 17 17"></polyline>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('obsidianCard');
        const bleed = document.getElementById('bleed');
        const starField = document.getElementById('starField');

        // Generate static stars
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.setProperty('--duration', `${2 + Math.random() * 4}s`);
            starField.appendChild(star);
        }

        // Interactive light bleed movement
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            
            bleed.style.setProperty('--x', `${x}%`);
            bleed.style.setProperty('--y', `${y}%`);

            // Tilt effect
            const rotateY = ((e.clientX - rect.left) / rect.width - 0.5) * 15;
            const rotateX = ((e.clientY - rect.top) / rect.height - 0.5) * -15;
            card.style.transform = `translateY(-10px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = `translateY(0px) rotateX(0deg) rotateY(0deg)`;
        });
    </script>
</body>
</html>
