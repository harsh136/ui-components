<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amethyst Mercury Glyph-Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --purple: #a855f7;
            --white: #ffffff;
            --border: rgba(168, 85, 247, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            min-height: 100vh; /* Changed to min-height for safety */
            width: 100%;
            display: flex;     /* This ensures centering */
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .card {
            position: relative;
            width: 650px;
            height: 300px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(168, 85, 247, 0.05);
            transition: border-color 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: crosshair;
            flex-shrink: 0; /* Prevents squishing on small screens */
        }

        .card:hover {
            border-color: var(--purple);
        }

        .ascii-canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.85;
            transition: opacity 0.6s ease;
        }

        .card:hover .ascii-canvas-container {
            opacity: 1;
        }

        canvas {
            display: block;
        }


        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--purple), transparent);
            opacity: 0.2;
            animation: scan 4s linear infinite;
            z-index: 5;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* Noise Texture Overlay */
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="card" id="card">
        <div class="scan-line"></div>
        <div class="ascii-canvas-container">
            <canvas id="asciiCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('asciiCanvas');
        const ctx = canvas.getContext('2d');
        const card = document.getElementById('card');

        let width, height, rows, cols;
        const fontSize = 12;
        const chars = " .:-=+*#%@".split("");
        let time = 0;
        let mouseX = 0;
        let mouseY = 0;
        let hoverTarget = 0;
        let hoverActive = 0;

        function init() {
            const rect = card.getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            canvas.width = width;
            canvas.height = height;
            cols = Math.floor(width / fontSize);
            rows = Math.floor(height / fontSize);
        }

        window.addEventListener('resize', init);
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) / width;
            mouseY = (e.clientY - rect.top) / height;
        });

        card.addEventListener('mouseenter', () => hoverTarget = 1);
        card.addEventListener('mouseleave', () => hoverTarget = 0);

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            hoverActive += (hoverTarget - hoverActive) * 0.1;

            ctx.font = `${fontSize}px 'JetBrains Mono'`;
            ctx.textAlign = 'center';

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const nx = x / cols;
                    const ny = y / rows;

                    // Fluid noise logic
                    const distToMouse = Math.sqrt(Math.pow(nx - mouseX, 2) + Math.pow(ny - mouseY, 2));
                    // Note: Warping effect (mouseInfluence) is kept, but speed is detached below
                    const mouseInfluence = Math.exp(-distToMouse * 5) * hoverActive;
                    
                    const noise = Math.sin(nx * 5 + time * 1.5) * Math.cos(ny * 4 - time * 0.8) * Math.sin((nx + ny) * 3 + time);
                    
                    const val = (noise + 1) / 2 + (mouseInfluence * 0.5);
                    const charIndex = Math.floor(val * (chars.length - 1));
                    const char = chars[Math.max(0, Math.min(charIndex, chars.length - 1))];

                    // Color transitions: Black -> Purple -> White
                    let r, g, b;
                    if (val < 0.4) {
                        r = val * 50;
                        g = 0;
                        b = val * 100;
                    } else if (val < 0.7) {
                        const t = (val - 0.4) / 0.3;
                        r = 50 + t * (168 - 50);
                        g = t * 85;
                        b = 100 + t * (247 - 100);
                    } else {
                        const t = (val - 0.7) / 0.3;
                        r = 168 + t * (255 - 168);
                        g = 85 + t * (255 - 85);
                        b = 247 + t * (255 - 247);
                    }

                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillText(char, x * fontSize + fontSize / 2, y * fontSize + fontSize);
                }
            }

            time += 0.015; 
            
            requestAnimationFrame(draw);
        }

        init();
        draw();
    </script>
</body>
</html>
