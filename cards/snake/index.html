<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --monolith-bg: #0a0a0a;
            --brushed-light: #2a2a2a;
            --brushed-dark: #121212;
            --accent: #00f2ff;
            --metal-shine: rgba(255,255,255,0.05);
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: white;
            perspective: 1000px;
        }

        .kinetic-monolith {
            position: relative;
            width: 420px;
            background: linear-gradient(135deg, var(--brushed-light) 0%, var(--brushed-dark) 100%);
            padding: 2px;
            border-radius: 4px;
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.8),
                inset 0 1px 1px rgba(255,255,255,0.1);
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .kinetic-monolith::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 1px,
                    rgba(255,255,255,0.02) 1px,
                    rgba(255,255,255,0.02) 2px
                );
            pointer-events: none;
        }

        .inner-frame {
            background: #000;
            border-radius: 2px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .title {
            font-family: var(--font-main);
            font-size: 42px;
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -2px;
            text-transform: uppercase;
            color: #fff;
            opacity: 0.9;
        }

        .status-panel {
            font-family: var(--font-mono);
            font-size: 10px;
            text-align: right;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .game-viewport {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: none;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .data-footer {
            margin-top: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            font-family: var(--font-mono);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 16px;
        }

        .data-node .label {
            font-size: 9px;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .data-node .value {
            font-size: 13px;
            color: #aaa;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.05);
            position: absolute;
            z-index: 2;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .cursor-ring {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
            mix-blend-mode: difference;
        }

        .grain {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            pointer-events: none;
            z-index: 5;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>

    <div class="kinetic-monolith" id="card">
        <div class="inner-frame">
            <div class="header">
                <div class="title">S-01<br>KINETIC</div>
                <div class="status-panel">
                    AUTOPILOT: ACTIVE<br>
                    EVASION: ON<br>
                    <span id="fps-counter">60</span> FPS
                </div>
            </div>

            <div class="game-viewport" id="viewport">
                <div class="scanline"></div>
                <div class="grain"></div>
                <div class="cursor-ring" id="ring"></div>
                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="data-footer">
                <div class="data-node">
                    <span class="label">Detection Vector</span>
                    <span class="value" id="vector-val">0.000, 0.000</span>
                </div>
                <div class="data-node">
                    <span class="label">Entity Mass</span>
                    <span class="value" id="mass-val">12 Units</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const viewport = document.getElementById('viewport');
        const ring = document.getElementById('ring');
        const card = document.getElementById('card');
        const vectorDisplay = document.getElementById('vector-val');
        const massDisplay = document.getElementById('mass-val');

        // High DPI setup
        const dpr = window.devicePixelRatio || 1;
        const size = 372;
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        ctx.scale(dpr, dpr);

        const gridSize = 20;
        const tileSize = size / gridSize;

        let snake = [
            {x: 10, y: 10},
            {x: 10, y: 11},
            {x: 10, y: 12},
            {x: 10, y: 13},
            {x: 10, y: 14}
        ];

        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = -1;
        let mouseX = -100;
        let mouseY = -100;
        let score = 0;
        let frameCount = 0;

        // Visual Interaction
        viewport.addEventListener('mousemove', (e) => {
            const rect = viewport.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) / (rect.width / gridSize);
            mouseY = (e.clientY - rect.top) / (rect.height / gridSize);
            
            ring.style.left = (e.clientX - rect.left) + 'px';
            ring.style.top = (e.clientY - rect.top) + 'px';
            ring.style.width = '60px';
            ring.style.height = '60px';

            vectorDisplay.textContent = `${mouseX.toFixed(3)}, ${mouseY.toFixed(3)}`;
            
            // Tilt card effect
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const rotateX = (e.clientY - centerY) / 25;
            const rotateY = (e.clientX - centerX) / 25;
            card.style.transform = `rotateX(${-rotateX}deg) rotateY(${rotateY}deg)`;
        });

        viewport.addEventListener('mouseleave', () => {
            mouseX = -100;
            mouseY = -100;
            ring.style.width = '0px';
            ring.style.height = '0px';
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });

        function getDistance(x1, y1, x2, y2) {
            return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
        }

        function updateAI() {
            const head = snake[0];
            let bestDir = {x: dx, y: dy};
            let maxScore = -Infinity;

            const possibleDirs = [
                {x: 0, y: -1}, {x: 0, y: 1}, 
                {x: -1, y: 0}, {x: 1, y: 0}
            ];

            possibleDirs.forEach(dir => {
                // Prevent 180 degree turns
                if (dir.x === -dx && dir.y === -dy) return;

                const nextX = (head.x + dir.x + gridSize) % gridSize;
                const nextY = (head.y + dir.y + gridSize) % gridSize;

                // Simple collision avoidance (self)
                let collision = false;
                for(let i = 1; i < snake.length; i++) {
                    if(snake[i].x === nextX && snake[i].y === nextY) collision = true;
                }
                if(collision) return;

                let moveScore = 0;

                // RUN AWAY from mouse
                const distToMouse = getDistance(nextX, nextY, mouseX, mouseY);
                if (distToMouse < 6) {
                    moveScore += distToMouse * 50; // High priority evasion
                } else {
                    // Seek food if mouse is safe
                    const distToFood = getDistance(nextX, nextY, food.x, food.y);
                    moveScore -= distToFood;
                }

                if (moveScore > maxScore) {
                    maxScore = moveScore;
                    bestDir = dir;
                }
            });

            dx = bestDir.x;
            dy = bestDir.y;
        }

        function draw() {
            frameCount++;
            if (frameCount % 4 !== 0) {
                requestAnimationFrame(draw);
                return;
            }

            updateAI();

            const head = { x: (snake[0].x + dx + gridSize) % gridSize, y: (snake[0].y + dy + gridSize) % gridSize };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                food = {
                    x: Math.floor(Math.random() * gridSize),
                    y: Math.floor(Math.random() * gridSize)
                };
                massDisplay.textContent = `${snake.length} Units`;
            } else {
                snake.pop();
            }

            // Clear canvas with trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, size, size);

            // Draw Food
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#fff';
            ctx.fillStyle = '#fff';
            ctx.fillRect(food.x * tileSize + 4, food.y * tileSize + 4, tileSize - 8, tileSize - 8);
            ctx.shadowBlur = 0;

            // Draw Snake
            snake.forEach((part, index) => {
                const alpha = 1 - (index / snake.length);
                const isHead = index === 0;
                
                ctx.fillStyle = isHead ? `rgba(0, 242, 255, 1)` : `rgba(0, 242, 255, ${alpha * 0.5})`;
                
                if (isHead) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(0, 242, 255, 0.8)';
                }
                
                ctx.fillRect(
                    part.x * tileSize + 1, 
                    part.y * tileSize + 1, 
                    tileSize - 2, 
                    tileSize - 2
                );
                ctx.shadowBlur = 0;
            });

            requestAnimationFrame(draw);
        }

        draw();

        // FPS Mockup for aesthetic
        setInterval(() => {
            document.getElementById('fps-counter').textContent = Math.floor(Math.random() * 5) + 56;
        }, 1000);

    </script>
</body>
</html>
