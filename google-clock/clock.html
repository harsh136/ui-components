<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Round|Material+Icons+Sharp|Material+Icons+Two+Tone"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        width: 100%;
        height: 100vh;
        margin: 0;
        padding: 0;
      }
      .center {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #212121
      }
      .clock {
        width: 250px;
        height: 250px;
        border-radius: 50%;
        position: relative;
      }
      .clock svg {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 0;
        filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.5));
      }
      .seconds {
        width: 16px;
        height: 16px;
        position: absolute;
        top: calc(50% - 8px);
        left: calc(50% - 8px);
        background: #eeeeee;
        border-radius: 50%;
        z-index: 1;
      }
      .minutes {
        background-color: #757575;
      }
      .minutes,
      .hours {
        width: 16px;
        height: 80px;
        /* background: #eeeeee; */
        border-radius: 3mm;
        position: absolute;
        top: calc(50% - 8px);
        left: calc(50% - 8px);
        transform-origin: 8px 8px;
        z-index: 1;
      }
      .hours {
        height: 64px;
        background: #eeeeee;
      }
      .date {
        position: absolute;
        width: 50px;
        height: 16px;
        top: calc(50% - 8px);
        left: calc(50% - 25px);
        font-family: poppins;
        font-size: 13px;
        color: #d6d6d6;
        background: none;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="center">
      <div class="clock">
        <svg fill="none" height="100%" viewBox="0 0 461 461" width="100%" xmlns="http://www.w3.org/2000/svg">
    <path class="bgLightTint" d="M93.6379 63.9405C89.7543 78.4344 78.4333 89.7554 63.9394 93.639L56.4989 95.6327C34.0934 101.636 20.7969 124.666 26.8005 147.072L28.7201 154.236C32.6038 168.73 28.46 184.195 17.8497 194.805L12.3015 200.353C-4.1005 216.755 -4.10051 243.348 12.3015 259.75L17.9236 265.372C28.5338 275.983 32.6776 291.447 28.794 305.941L26.8004 313.382C20.7968 335.787 34.0933 358.817 56.4989 364.821L63.9395 366.815C78.4334 370.698 89.7544 382.019 93.638 396.513L95.6322 403.956C101.636 426.361 124.666 439.658 147.071 433.654L154.513 431.66C169.007 427.777 184.472 431.92 195.082 442.531L200.353 447.802C216.755 464.204 243.348 464.204 259.75 447.802L265.097 442.455C275.707 431.845 291.172 427.701 305.666 431.585L313.383 433.653C335.788 439.656 358.818 426.36 364.822 403.954L366.815 396.515C370.699 382.021 382.02 370.7 396.514 366.816L403.955 364.822C426.361 358.819 439.657 335.789 433.654 313.383L431.586 305.665C427.702 291.172 431.846 275.707 442.456 265.096L447.802 259.75C464.204 243.348 464.204 216.755 447.802 200.353L442.53 195.081C431.92 184.471 427.776 169.006 431.66 154.512L433.654 147.071C439.657 124.665 426.361 101.635 403.955 95.6312L396.514 93.6373C382.02 89.7537 370.699 78.4327 366.815 63.9389L364.822 56.4994C358.818 34.0938 335.788 20.7974 313.383 26.8009L305.942 28.7946C291.448 32.6782 275.983 28.5345 265.373 17.9242L259.75 12.3015C243.348 -4.10051 216.755 -4.1005 200.353 12.3015L194.806 17.8491C184.196 28.4593 168.731 32.6031 154.237 28.7195L147.071 26.7995C124.666 20.7959 101.636 34.0924 95.6322 56.498L93.6379 63.9405Z" fill="rgb(66, 66, 66)" />
  </svg>
        <div class="seconds"></div>
        <div class="minutes"></div>
        <div class="hours"></div>
        <div class="date"></div>
      </div>
    </div>
    <script>
      const interval = setInterval(() => {
        var date = new Date();
        let secondsPoint = document.querySelector(".seconds");
        let minutesPoint = document.querySelector(".minutes");
        let hoursPoint = document.querySelector(".hours");
        let datePoint = document.querySelector(".date");

        let secPosition = date.getSeconds() * 6;
        let minPosition = date.getMinutes() * 6;
        let hourPosition = date.getHours() * 30;

        let dayArray = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        datePoint.innerHTML = dayArray[date.getDay()] + " " + date.getDate();

        if (secPosition == 0) {
          secondsPoint.style.transition = "none";
          datePoint.style.transition = "none";
        } else {
          secondsPoint.style.transition = "0.25s";
          datePoint.style.transition = "0.25s";
        }
        if (minPosition == 0) {
          minutesPoint.style.transition = "none";
        } else {
          minutesPoint.style.transition = "0.25s";
        }
        secondsPoint.style.transform = `rotate(${secPosition}deg) translateY(-84px)`;
        minutesPoint.style.transform = `rotate(${minPosition - 180}deg)`;
        hoursPoint.style.transform = `rotate(${hourPosition - 180}deg)`;
        datePoint.style.transform = `rotate(${secPosition - 180}deg) translateY(-84px)`;
      }, 1000);
    </script>
  </body>
</html>
