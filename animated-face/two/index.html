<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Kinetic Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050506;
            --obsidian: #0a0a0c;
            --satin-sheen: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --accent-dim: #444;
            --glare: rgba(255, 255, 255, 0.15);
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, #1a1a20 0%, transparent 70%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 10px);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--accent);
            font-family: var(--font-sans);
        }

        /* --- UI OVERLAY --- */
        .interface-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand {
            font-weight: 800;
            letter-spacing: -1px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent-dim);
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.2); }
        }

        /* --- CHARACTER CORE --- */
        .character-container {
            position: relative;
            z-index: 5;
            perspective: 1000px;
        }

        .obsidian-core {
            width: 280px;
            height: 280px;
            background: var(--obsidian);
            border-radius: 42% 58% 50% 50% / 45% 45% 55% 55%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease-out, border-radius 0.6s ease-in-out;
            box-shadow: 
                inset 0 10px 40px rgba(255,255,255,0.05),
                inset 0 -10px 40px rgba(0,0,0,0.8),
                0 40px 100px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            animation: morphing 8s infinite ease-in-out;
            pointer-events: auto;
        }

        @keyframes morphing {
            0%, 100% { border-radius: 42% 58% 50% 50% / 45% 45% 55% 55%; }
            25% { border-radius: 50% 50% 42% 58% / 55% 55% 45% 45%; }
            50% { border-radius: 58% 42% 55% 45% / 45% 55% 45% 55%; }
            75% { border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%; }
        }

        /* Satin Sheen Reflection */
        .obsidian-core::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                135deg,
                transparent 45%,
                var(--satin-sheen) 50%,
                transparent 55%
            );
            transform: rotate(0deg);
            pointer-events: none;
            animation: sheen-flow 6s infinite linear;
        }

        @keyframes sheen-flow {
            from { transform: translateX(-30%) rotate(0deg); }
            to { transform: translateX(30%) rotate(20deg); }
        }

        /* Eyes */
        .eye-system {
            display: flex;
            gap: 60px;
            z-index: 2;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.4));
        }

        .eye {
            width: 4px;
            height: 32px;
            background: var(--accent);
            border-radius: 2px;
            transition: transform 0.1s ease-out, height 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .eye::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            filter: blur(8px);
            opacity: 0.3;
        }

        .eye.blink {
            height: 1px;
            transform: scaleX(2);
        }

        /* --- DATA FOOTER --- */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-family: var(--font-mono);
        }

        .data-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 0.6rem;
            color: var(--accent-dim);
            text-transform: uppercase;
        }

        .value {
            font-size: 0.8rem;
            font-weight: 300;
        }

        /* --- PARTICLES & CURSOR --- */
        .custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: difference;
            transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1);
            transform: translate(-50%, -50%);
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.4;
            z-index: 1;
        }

        @keyframes float-particle {
            to {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="custom-cursor" id="cursor"></div>

    <div class="interface-layer">
        <div class="header">
            <div class="brand">Obsidian.OS</div>
            <div class="status-pill">
                <div class="status-dot"></div>
                SYSTEM ACTIVE
            </div>
        </div>

        <div class="footer">
            <div class="data-block">
                <span class="label">Kinetic Load</span>
                <span class="value" id="load-val">12.4%</span>
            </div>
            <div class="data-block" style="text-align: right;">
                <span class="label">Neural Latency</span>
                <span class="value">0.002ms</span>
            </div>
        </div>
    </div>

    <div class="character-container" id="container">
        <div class="obsidian-core" id="core">
            <div class="eye-system">
                <div class="eye left"></div>
                <div class="eye right"></div>
            </div>
        </div>
    </div>

    <script>
        const core = document.getElementById('core');
        const container = document.getElementById('container');
        const eyes = document.querySelectorAll('.eye');
        const cursor = document.getElementById('cursor');
        const loadVal = document.getElementById('load-val');

        let mouseX = 0;
        let mouseY = 0;
        let currentX = 0;
        let currentY = 0;

        // Custom Cursor & Mouse Movement
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';

            const { left, top, width, height } = core.getBoundingClientRect();
            const coreX = left + width / 2;
            const coreY = top + height / 2;

            const diffX = mouseX - coreX;
            const diffY = mouseY - coreY;
            const angle = Math.atan2(diffY, diffX);
            const dist = Math.min(20, Math.sqrt(diffX*diffX + diffY*diffY) / 10);

            // Kinetic Core tilt
            const tiltX = (mouseY - window.innerHeight/2) * 0.05;
            const tiltY = (mouseX - window.innerWidth/2) * -0.05;
            core.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) translate(${diffX * 0.02}px, ${diffY * 0.02}px)`;

            // Eye movement
            eyes.forEach(eye => {
                const ex = Math.cos(angle) * dist;
                const ey = Math.sin(angle) * dist;
                eye.style.transform = `translate(${ex}px, ${ey}px)`;
            });
        });

        // Click interaction
        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.7)';
            core.style.transform += ' scale(0.95)';
            spawnParticles(mouseX, mouseY);
        });

        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            core.style.transform = core.style.transform.replace(' scale(0.95)', '');
        });

        // Blinking logic
        function blink() {
            eyes.forEach(e => e.classList.add('blink'));
            setTimeout(() => {
                eyes.forEach(e => e.classList.remove('blink'));
            }, 120);
            
            const nextBlink = Math.random() * 4000 + 2000;
            setTimeout(blink, nextBlink);
        }
        blink();

        // High-fidelity Particles
        function spawnParticles(x, y) {
            for(let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 3 + 1;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const dx = (Math.random() - 0.5) * 150;
                const dy = (Math.random() - 0.5) * 150;
                
                p.style.setProperty('--dx', dx + 'px');
                p.style.setProperty('--dy', dy + 'px');
                p.style.animation = `float-particle ${Math.random() * 0.5 + 0.5}s forwards cubic-bezier(0.165, 0.84, 0.44, 1)`;
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        // Kinetic Load simulation
        setInterval(() => {
            const load = (10 + Math.random() * 5).toFixed(1);
            loadVal.textContent = load + '%';
        }, 1500);

        // Ambient movement interpolation
        function animate() {
            currentX += (mouseX - currentX) * 0.05;
            currentY += (mouseY - currentY) * 0.05;
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
